<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Elevate Capital · Conseiller Assurance</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Serif+Display&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{--gold:#C8A951;--gold-d:#A07828;--gold-bg:#FBF6E8;--gold-bg2:#F5EDD4;--dark:#2D2D2D;--bg:#F5F0E1;--bg2:#FAF7F0;--border:#DDD5BC;--text:#3D3528;--muted:#7A6E5A;--light:#A09070;--green:#16a34a;--red:#dc2626;--radius:10px;--shadow:0 2px 12px rgba(45,35,20,.08);--shadow-md:0 4px 24px rgba(45,35,20,.12)}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}
input,select,textarea,button{font-family:'DM Sans',sans-serif;font-size:inherit}
input:focus,select:focus,textarea:focus{outline:2px solid var(--gold);outline-offset:1px}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--gold);border-radius:3px}

/* ── HEADER ── */
.hdr{background:var(--dark);padding:13px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:3px solid var(--gold);flex-wrap:wrap;gap:10px;position:sticky;top:0;z-index:100;box-shadow:0 2px 20px rgba(0,0,0,.35)}
.hdr-brand{display:flex;align-items:center;gap:12px}
.hdr-logo{width:34px;height:34px;background:var(--gold);border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'DM Serif Display',serif;font-size:16px;color:var(--dark);font-weight:700;flex-shrink:0}
.hdr-title{font-size:15px;font-weight:700;color:white;letter-spacing:-.2px}
.hdr-sub{font-size:11px;color:var(--light);margin-top:1px}
.hdr-btns{display:flex;gap:6px;align-items:center;flex-wrap:wrap}

/* ── BUTTONS ── */
.btn{padding:7px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:none;display:inline-flex;align-items:center;gap:5px;transition:all .15s;white-space:nowrap}
.btn-gold{background:var(--gold);color:var(--dark)}
.btn-gold:hover{background:var(--gold-d)}
.btn-dark{background:rgba(255,255,255,.1);color:white;border:1px solid rgba(255,255,255,.18)!important}
.btn-dark:hover{background:rgba(255,255,255,.16)}
.btn-outline{background:white;color:var(--text);border:1px solid var(--border)!important}
.btn-outline:hover{border-color:var(--gold)!important;color:var(--gold)}
.btn-sm{padding:5px 11px;font-size:11px}
.btn-danger{background:rgba(220,38,38,.08);color:var(--red);border:1px solid rgba(220,38,38,.25)!important}

/* ── STEPPER ── */
.stepper{background:white;border-radius:var(--radius);border:1px solid var(--border);padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;gap:3px;flex-wrap:wrap;row-gap:8px;box-shadow:var(--shadow)}
.step-item{display:flex;align-items:center;gap:6px;cursor:pointer;opacity:.38;transition:opacity .15s}
.step-item.active,.step-item.done{opacity:1}
.step-circle{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;background:#ECDFC4;color:var(--muted);flex-shrink:0;transition:all .2s}
.step-item.active .step-circle,.step-item.done .step-circle{background:var(--gold);color:var(--dark)}
.step-label{font-size:12px;color:var(--muted);white-space:nowrap}
.step-item.active .step-label{font-weight:700;color:var(--gold)}
.step-sep{width:16px;height:1px;background:var(--border)}

/* ── CARDS ── */
.card{background:white;border-radius:12px;border:1px solid var(--border);padding:20px 22px;margin-bottom:14px;box-shadow:var(--shadow)}
.card-accent{border-color:var(--gold)}
.card-red{border-color:rgba(220,38,38,.3)}

/* ── SEC HEAD ── */
.sec-head{display:flex;align-items:center;gap:10px;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid #F5EDD4}
.sec-head-bar{width:4px;height:20px;border-radius:2px;background:var(--gold);flex-shrink:0}
.sec-head-bar-red{background:var(--red)!important}
.sec-head-bar-muted{background:var(--light)!important}
.sec-head-inner{flex:1}
.sec-head-title{font-size:14px;font-weight:700;color:var(--dark)}
.sec-head-sub{font-size:11px;color:var(--muted);margin-top:2px}

/* ── GRID ── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px}
@media(max-width:700px){.g2,.g3,.g4{grid-template-columns:1fr!important}.resp-hide{display:none!important}}

/* ── FORM ── */
.lbl{font-size:10px;font-weight:700;color:#5A4E3A;margin-bottom:4px;display:block;text-transform:uppercase;letter-spacing:.06em}
.inp{width:100%;padding:9px 11px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;background:white;color:var(--text);transition:border .15s}
.inp:focus{border-color:var(--gold)}
.inp-err{border-color:var(--red)!important}
.err-txt{font-size:11px;color:var(--red);margin-top:3px}
.sel{width:100%;padding:9px 11px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;background:white;color:var(--text)}
.sel:focus{outline:2px solid var(--gold);outline-offset:1px}
.money-wrap{position:relative}
.money-sym{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:12px;color:var(--light);pointer-events:none;font-weight:600}
.money-inp{padding-left:22px!important}

/* ── PILLS ── */
.pill{padding:7px 14px;border-radius:20px;cursor:pointer;border:1.5px solid var(--border);background:white;font-size:12px;color:#5A4E3A;transition:all .12s;font-weight:400}
.pill:hover{border-color:var(--gold);color:var(--gold-d)}
.pill.on{border:2px solid var(--gold);background:var(--gold);color:var(--dark);font-weight:700}

/* ── DOC BUTTONS ── */
.doc-btn{padding:7px 15px;border-radius:20px;cursor:pointer;font-size:12px;font-weight:600;border:1.5px solid transparent;transition:all .15s}
.doc-null{background:#F5F0E1;color:var(--light);border-color:var(--border)}
.doc-yes{background:#dcfce7;color:#166534;border-color:#86efac}
.doc-no{background:#fee2e2;color:var(--red);border-color:#fca5a5}

/* ── TABS ── */
.tabs{display:flex;gap:2px;background:var(--bg);padding:4px;border-radius:9px;margin-bottom:14px}
.tab{padding:7px 14px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;border:none;background:transparent;color:var(--muted);transition:all .15s}
.tab.active{background:white;color:var(--text);box-shadow:0 1px 6px rgba(0,0,0,.1)}

/* ── NAV ROW ── */
.nav-row{display:flex;justify-content:space-between;align-items:center;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:10px;font-size:11px;font-weight:600}
.badge-gold{background:var(--gold-bg);color:#7A5A1A;border:1px solid var(--border)}
.badge-green{background:#f0fdf4;color:#166534;border:1px solid #bbf7d0}
.badge-red{background:#fef2f2;color:#991b1b;border:1px solid #fecaca}
.badge-gray{background:#f8fafc;color:#64748b;border:1px solid #e2e8f0}

/* ── INFO BOX ── */
.info-box{display:flex;align-items:flex-start;gap:10px;padding:11px 14px;background:var(--gold-bg);border-radius:9px;border:1px solid rgba(200,169,81,.3);font-size:12px;color:#5A3E00;margin-top:10px}

/* ── STATUS BANNER ── */
.status-dashed{display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--bg2);border-radius:9px;border:1px dashed #cbd5e1;font-size:13px;color:var(--light)}

/* ── BILAN TABLE ── */
.bilan-actif{background:#FBF6E8;border-radius:9px;padding:12px 14px;margin-bottom:12px;border:1px solid rgba(200,169,81,.2)}
.bilan-passif{background:#FFF0EE;border-radius:9px;padding:12px 14px;border:1px solid rgba(220,38,38,.1)}
.bilan-row{display:grid;gap:8px;align-items:center;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.6)}
.bilan-row:last-child{border:none}
.bilan-lbl{font-size:12px;color:var(--text)}
.bilan-total{display:grid;gap:8px;margin-top:10px;padding-top:8px;border-top:2px solid;align-items:center}

/* ── VIE TABLE ── */
.vie-table{width:100%;border-collapse:collapse;font-size:12px}
.vie-table th{padding:7px 8px;background:var(--bg);font-weight:700;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);white-space:nowrap}
.vie-table td{padding:4px 4px;border-top:1px solid var(--bg)}
.vie-table .cell-inp{width:100%;padding:5px 7px;border:1.5px solid var(--border);border-radius:6px;font-size:12px;background:white;font-family:'DM Sans',sans-serif}
.vie-table .cell-inp:focus{border-color:var(--gold);outline:none}

/* ── RISK ── */
.risk-card{margin-bottom:10px;padding:16px 18px;background:var(--bg2);border-radius:10px;border:1.5px solid var(--border)}
.risk-card.answered{background:var(--gold-bg);border-color:var(--gold)}
.risk-opt{display:flex;align-items:center;gap:10px;padding:9px 13px;border-radius:8px;border:1.5px solid var(--border);cursor:pointer;background:white;margin-bottom:6px;text-align:left;width:100%;transition:all .12s;font-size:13px}
.risk-opt:hover{border-color:var(--gold)}
.risk-opt.sel{border-color:#8b5cf6;background:#f5f3ff;font-weight:600}
.risk-radio{width:17px;height:17px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;transition:all .15s}
.risk-opt.sel .risk-radio{border-color:#8b5cf6;background:#8b5cf6}
.risk-progress{width:100%;background:var(--bg);border-radius:6px;height:7px;margin-bottom:20px;overflow:hidden}
.risk-bar{height:7px;background:var(--gold-d);border-radius:6px;transition:width .3s}

/* ── NEEDS ── */
.need-pill{padding:8px 14px;border-radius:22px;cursor:pointer;border:1.5px solid var(--border);background:white;font-size:12px;color:#5A4E3A;transition:all .12s;display:inline-flex;align-items:center;gap:5px}
.need-pill.on{border:2px solid var(--gold);background:var(--gold-bg);font-weight:700;color:var(--dark)}
.need-pill:hover{border-color:var(--gold)}

/* ── RECS ── */
.rec-card{background:white;border-radius:12px;border:1.5px solid var(--border);overflow:hidden;margin-bottom:10px;transition:all .15s}
.rec-card.sel{border-color:var(--gold);box-shadow:0 0 0 3px rgba(200,169,81,.15)}
.rec-header{display:flex;align-items:center;gap:10px;padding:13px 16px;border-bottom:1px solid var(--bg)}
.rec-body{padding:13px 16px}

/* ── SUMMARY ── */
.sum-section{background:white;border-radius:10px;border:1px solid var(--border);margin-bottom:14px;overflow:hidden}
.sum-head{background:var(--bg);padding:10px 16px;font-size:11px;font-weight:700;color:#5A4E3A;border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:.05em}
.sum-body{padding:16px 18px}

/* ── ADMIN ── */
.admin-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;display:flex}
.admin-panel{width:min(780px,96vw);background:#111;display:flex;flex-direction:column;margin-left:auto;height:100vh;overflow:hidden;box-shadow:-8px 0 50px rgba(0,0,0,.6);border-left:1px solid rgba(255,255,255,.06)}
.admin-hdr{background:#1A1A1A;padding:14px 18px;border-bottom:3px solid var(--gold);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;flex-wrap:wrap;gap:8px}
.admin-body{display:flex;flex:1;overflow:hidden}
.admin-sb{width:180px;background:#0D0D0D;border-right:1px solid rgba(255,255,255,.05);overflow-y:auto;flex-shrink:0;padding:8px 0}
.admin-main{flex:1;overflow-y:auto;padding:16px 18px}
.admin-prod-btn{display:flex;width:100%;align-items:center;justify-content:space-between;text-align:left;padding:9px 14px;border:none;background:transparent;color:rgba(255,255,255,.45);font-size:11px;cursor:pointer;border-left:3px solid transparent;transition:all .12s;font-family:'DM Sans',sans-serif;gap:4px}
.admin-prod-btn.on{background:rgba(200,169,81,.1);color:var(--gold);border-left-color:var(--gold)}
.admin-co-row{background:rgba(255,255,255,.03);border-radius:8px;padding:10px 13px;border:1px solid rgba(255,255,255,.05);margin-bottom:6px}
.admin-inp{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:5px;color:rgba(255,255,255,.6);font-size:11px;padding:5px 9px;font-family:'DM Sans',sans-serif}
.admin-inp:focus{outline:1px solid var(--gold);border-color:var(--gold)}
.label-btn{width:28px;height:28px;border-radius:6px;border:1.5px solid rgba(200,169,81,.15);background:transparent;cursor:pointer;font-size:13px;display:inline-flex;align-items:center;justify-content:center;transition:all .15s}
.label-btn.star-on{border-color:var(--gold);background:rgba(200,169,81,.2)}
.label-btn.check-on{border-color:#4ade80;background:rgba(74,222,128,.12)}
.label-btn.case-on{border-color:#94a3b8;background:rgba(148,163,184,.1)}

/* ── PRINT ── */
@media print{
  .no-print{display:none!important}
  body{background:white;font-size:10px}
  .card{box-shadow:none;border-color:#e5e7eb}
}

/* ── SCENARIO CARD ── */
.sc-card{border-radius:10px;padding:16px;border:1.5px solid var(--border);background:white;text-align:center;position:relative}
.sc-card.highlight{border-color:var(--gold);background:var(--gold-bg);box-shadow:var(--shadow)}

/* ── PROGRESS BAR ── */
.pbar{background:var(--bg);border-radius:6px;height:8px;overflow:hidden}
.pbar-fill{height:8px;background:var(--gold);border-radius:6px;transition:width .4s}

.tip{position:relative;display:inline-flex;align-items:center;cursor:help}
.tip::after{content:attr(data-tip);position:absolute;bottom:calc(100%% + 6px);left:50%%;transform:translateX(-50%%);background:#1a1a2e;color:white;font-size:10px;padding:6px 10px;border-radius:7px;white-space:normal;max-width:240px;line-height:1.4;z-index:9999;opacity:0;pointer-events:none;transition:opacity .15s;font-weight:400;box-shadow:0 4px 12px rgba(0,0,0,.3)}
.tip::before{content:"";position:absolute;bottom:calc(100%% + 1px);left:50%%;transform:translateX(-50%%);border:4px solid transparent;border-top-color:#1a1a2e;z-index:9999;opacity:0;pointer-events:none;transition:opacity .15s}
.tip:hover::after,.tip:hover::before{opacity:1}
.tip-icon{display:inline-flex;align-items:center;justify-content:center;width:14px;height:14px;border-radius:50%%;background:var(--gold);color:white;font-size:8px;font-weight:800;margin-left:4px;flex-shrink:0}
</style>
</head>
<body>

<!-- HEADER -->
<div class="hdr no-print">
  <div class="hdr-brand">
    <div class="hdr-logo">E</div>
    <div>
      <div class="hdr-title">Elevate Capital · Conseiller Assurance</div>
      <div class="hdr-sub">Analyse des besoins financiers — Usage interne</div>
    </div>
  </div>
  <div class="hdr-btns">
    <button class="btn btn-dark" onclick="showLanding()" style="font-size:11px">← Menu</button>
    <button class="btn btn-gold" onclick="exportDossier()">💾 Sauvegarder</button>
    <label class="btn btn-dark" style="cursor:pointer">📂 Charger<input type="file" accept=".json" style="display:none" onchange="importDossier(event)"></label>
    <button class="btn btn-dark" onclick="openAdmin()">⚙️ Préférences</button>
    <button class="btn btn-dark" onclick="window.print()">🖨️ Imprimer</button>
    <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
      <!-- Timer de rencontre -->
      <div style="display:flex;align-items:center;gap:4px;background:rgba(255,255,255,.06);border-radius:8px;padding:3px 8px;">
        <span style="font-size:9px;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.05em">Durée</span>
        <span id="hdr-timer" style="font-size:12px;font-weight:700;color:var(--gold);min-width:36px">00:00</span>
        <button id="timer-btn" onclick="startTimer()" title="Démarrer" style="background:none;border:none;color:var(--gold);cursor:pointer;font-size:11px;padding:0 2px">▶</button>
        <button onclick="resetTimer()" title="Reset" style="background:none;border:none;color:rgba(255,255,255,.3);cursor:pointer;font-size:9px;padding:0">↺</button>
      </div>
      <!-- Auto-save badge -->
      <div id="hdr-autosave" style="font-size:10px;color:rgba(255,255,255,.35)">—</div>
    </div>
    <div style="text-align:right">
      <div id="hdr-stats" style="font-size:11px;color:var(--gold);font-weight:600"></div>
      <div id="hdr-upd" style="font-size:10px;color:var(--light)"></div>
    </div>
  </div>
</div>

<!-- MAIN -->
<div style="max-width:1120px;margin:0 auto;padding:20px 16px">
  <!-- LANDING / CHOIX DE MODE -->
  <div id="landing" style="display:none"></div>
  <!-- COMPARATEUR -->
  <div id="comp-container" style="display:none"></div>
  <div class="stepper no-print" id="stepper" style="display:none"></div>
  <div id="step-0" style="display:none"></div>
  <div id="step-1" style="display:none"></div>
  <div id="step-2" style="display:none"></div>
  <div id="step-3" style="display:none"></div>
  <div id="step-4" style="display:none"></div>
  <div id="step-5" style="display:none"></div>
  <div id="step-6" style="display:none"></div>
  <div id="step-7" style="display:none"></div>
  <!-- EXPRESS -->
  <div id="step-e0" style="display:none"></div>
  <div id="step-e1" style="display:none"></div>
  <div id="step-e2" style="display:none"></div>
  <div id="step-e3" style="display:none"></div>
</div>

<!-- ADMIN OVERLAY -->
<div class="admin-overlay" id="admin-panel" style="display:none" onclick="if(event.target===this)closeAdmin()">
  <div class="admin-panel">
    <div class="admin-hdr">
      <div><div style="font-size:14px;font-weight:700;color:white">⚙️ Mes préférences compagnies</div><div style="font-size:10px;color:var(--light);margin-top:1px">Sauvegardé dans ce navigateur</div></div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center">
        <span id="admin-saved" style="display:none;font-size:11px;color:#4ade80;font-weight:600;background:rgba(74,222,128,.1);padding:3px 9px;border-radius:6px">✓ Sauvegardé</span>
        <button class="btn btn-sm" style="background:rgba(200,169,81,.12);color:var(--gold);border:1px solid rgba(200,169,81,.25)!important" onclick="exportPrefs()">⬇ Export</button>
        <label class="btn btn-sm btn-dark" style="cursor:pointer">⬆ Import<input type="file" accept=".json" style="display:none" onchange="importPrefs(event)"></label>
        <button class="btn btn-sm btn-danger" onclick="resetPrefs()">↺ Défaut</button>
        <button class="btn btn-sm btn-dark" onclick="closeAdmin()" style="font-size:15px;font-weight:700;padding:4px 10px">✕</button>
      </div>
    </div>
    <!-- Legend -->
    <div style="background:#0D0D0D;padding:9px 16px;border-bottom:1px solid rgba(255,255,255,.04);display:flex;gap:16px;flex-wrap:wrap;flex-shrink:0">
      <div style="display:flex;align-items:center;gap:7px"><span style="width:22px;height:22px;display:inline-flex;align-items:center;justify-content:center;border-radius:5px;background:rgba(200,169,81,.18);border:1px solid rgba(200,169,81,.45);font-size:12px">⭐</span><span style="font-size:12px;font-weight:600;color:rgba(255,255,255,.75)">Favori</span><span style="font-size:10px;color:rgba(255,255,255,.25)">priorité</span></div>
      <div style="display:flex;align-items:center;gap:7px"><span style="width:22px;height:22px;display:inline-flex;align-items:center;justify-content:center;border-radius:5px;background:rgba(74,222,128,.1);border:1px solid rgba(74,222,128,.35);font-size:12px">✓</span><span style="font-size:12px;font-weight:600;color:rgba(255,255,255,.75)">Solide</span><span style="font-size:10px;color:rgba(255,255,255,.25)">standard</span></div>
      <div style="display:flex;align-items:center;gap:7px"><span style="width:22px;height:22px;display:inline-flex;align-items:center;justify-content:center;border-radius:5px;background:rgba(148,163,184,.08);border:1px solid rgba(148,163,184,.28);font-size:12px">~</span><span style="font-size:12px;font-weight:600;color:rgba(255,255,255,.75)">Selon le cas</span><span style="font-size:10px;color:rgba(255,255,255,.25)">profil dépendant</span></div>
    </div>
    <div class="admin-body">
      <div class="admin-sb" id="admin-sb"></div>
      <div class="admin-main" id="admin-main"></div>
    </div>
  </div>
</div>

<script>
window.onerror = function(msg, src, line, col, err) {
  console.error("JS ERROR:", msg, "ligne", line, err);
  return false;
};

  // ── MOT DE PASSE ──
  (function(){

// Migration : s'assurer que toutes les compagnies de PRODUCTS_DEFAULT sont présentes dans chaque produit
function migrateProducts(saved) {
  if (!saved) return JSON.parse(JSON.stringify(PRODUCTS_DEFAULT));
  let changed = false;
  const result = JSON.parse(JSON.stringify(saved));
  // Pour chaque produit du catalogue par défaut
  Object.entries(PRODUCTS_DEFAULT).forEach(([prodName, prodDefault]) => {
    if (!result[prodName]) { result[prodName] = JSON.parse(JSON.stringify(prodDefault)); changed = true; return; }
    // Pour chaque compagnie du défaut, l'ajouter si absente
    Object.entries(prodDefault.companies).forEach(([coName, coDefault]) => {
      if (!result[prodName].companies[coName]) {
        result[prodName].companies[coName] = JSON.parse(JSON.stringify(coDefault));
        changed = true;
      }
    });
  });
  if (changed) { try { localStorage.setItem("ec_prefs_v2", JSON.stringify(result)); } catch(e){} }
  return result;
}

const STEPS=["Profil","Bilan ABF","Calcul ABF","Protections","Profil risque","Besoins / Priorités","Recommandations","Résumé"];
function getStepCompletion(step) {
  const checks = [
    // Étape 0 : Profil
    ()=>{ let f=0,t=4;
      if(S.vous.nom) f++; if(S.vous.prenom) f++; if(S.vous.dateNaissance) f++; if(S.vous.revenuEmploi>0) f++;
      return Math.round(f/t*100); },
    // Étape 1 : Bilan
    ()=>{ let f=0,t=3;
      const tA=Object.values(S.actif).reduce((a,b)=>a+b,0);
      const tP=Object.values(S.passif).reduce((a,b)=>a+b,0);
      if(tA>0)f++; if(tP>0)f++; if(S.abf.revMensuel>0)f++;
      return Math.round(f/t*100); },
    // Étape 2 : Calcul ABF — toujours complet si étape 1 faite
    ()=>S.abf.revMensuel>0?100:0,
    // Étape 3 : Protections
    ()=>{ let f=0,t=3;
      if(S._activeVie!==null)f++; if(S._activeInv!==null)f++; if(S._activeMG!==null)f++;
      return Math.round(f/t*100); },
    // Étape 4 : Profil risque
    ()=>{ const n=Object.keys(S.riskAns).length; return Math.min(100,Math.round(n/12*100)); },
    // Étape 5 : Besoins
    ()=>{ let f=0,t=2; if(S.besoins.length>0)f++; if(S.prioritesObjectifs.length>0)f++; return Math.round(f/t*100); },
    // Étape 6 : Recommandations
    ()=>S.selRecs.length>0?100:S.recs.length>0?50:0,
    // Étape 7 : Résumé — toujours accessible
    ()=>100
  ];
  try { return checks[step] ? checks[step]() : 0; } catch(e){ return 0; }
}

function renderStepper(){
  const c=$("stepper"); c.innerHTML="";
  STEPS.forEach((s,i)=>{
    if(i>0){const sep=document.createElement("div");sep.className="step-sep";c.appendChild(sep);}
    const d=document.createElement("div");
    const pct=getStepCompletion(i);
    d.className="step-item"+(i===currentStep?" active":i<currentStep?" done":"");
    // Badge complétion
    const pctBadge=document.createElement("div");
    pctBadge.style.cssText="position:absolute;bottom:-2px;left:50%;transform:translateX(-50%);font-size:8px;font-weight:700;white-space:nowrap;color:"+(pct===100?"var(--green)":pct>0?"var(--gold-d)":"var(--muted)");
    pctBadge.textContent=pct===100?"✓":pct>0?pct+"%":"";
    d.style.position="relative";
    d.innerHTML=`<div class="step-circle">${i<currentStep?"✓":i+1}</div><span class="step-label">${s}</span>`;
    d.onclick=()=>{if(i<=currentStep)showStep(i);};
    d.appendChild(pctBadge);
    c.appendChild(d);
  });
}

// STEP 2 — CALCUL ABF

function renderStep2(){
  const c=$("step-2"); c.innerHTML="";
  const aC=isConjoint();
  const totA=Object.values(S.actif).reduce((a,b)=>a+b,0);
  const totP=Object.values(S.passif).reduce((a,b)=>a+b,0);
  const liqNet=totA-totP;
  const totAC=Object.values(S.actifC).reduce((a,b)=>a+b,0);
  const totPC=Object.values(S.passifC).reduce((a,b)=>a+b,0);
  const liqNetC=totAC-totPC;

  function makeScenarios(revMensuel,rrenteRRQ,duree,liqN){
    return [50,70,100].map(pct=>{
      const rev=Math.max(0,revMensuel*pct/100-rrenteRRQ);
      const f=getFacteur(duree,S.abf.taux);
      const cap=rev*f;
      const add=Math.max(0,cap-liqN);
      return {pct,rev,f,cap,add};
    });
  }
  const sc=makeScenarios(S.abf.revMensuel,S.abf.rrenteRRQ,S.abf.duree,liqNet);
  const scC=makeScenarios(S.abf.revMensuelC,S.abf.rrenteRRQC,S.abf.dureeC,liqNetC);

  if(S.abf.revMensuel>0){

      [[fmt(s.rev)+"/mois","Revenu à combler"],[s.f.toFixed(2),"Facteur ("+S.abf.duree+" ans, "+S.abf.taux+"%)"],[fmt(s.cap),"Capital requis"]].forEach(([v,l])=>{

      });

      g.appendChild(d);
    });
    card.appendChild(g);
    c.appendChild(card);
  }

  if(aC&&S.abf.revMensuelC>0){
    const cardC=document.createElement("div"); cardC.className="card";
    cardC.appendChild(makeSecHead("C & D — Montant d'assurance nécessaire — Conjoint(e)","","sec-head-bar-muted"));
    const gC=document.createElement("div"); gC.className="g3";
    scC.forEach((s,i)=>{
      const d=document.createElement("div"); d.className="sc-card"+(i===1?" highlight":"");
      d.innerHTML=`<div style="font-size:26px;font-weight:800;color:var(--gold-d)">${s.pct}%</div><div style="font-size:11px;color:var(--muted);margin-bottom:10px">Remplacement du revenu</div><div style="font-size:10px;color:var(--muted)">Capital requis</div><div style="font-size:16px;font-weight:700;margin-bottom:8px">${fmt(s.cap)}</div><div style="font-size:10px;color:var(--muted)">Assurance additionnelle</div><div style="font-size:19px;font-weight:800;color:${s.add>0?"var(--red)":"var(--gold-d)"}">${s.add>0?fmt(s.add):"✓ Couvert"}</div>`;
      gC.appendChild(d);
    });
    cardC.appendChild(gC);
    c.appendChild(cardC);

  tableCard.appendChild(makeSecHead("Table des facteurs — iA Groupe Financier","Capital requis pour générer 1$/mois de revenu","sec-head-bar-muted"));
  {

    const selD=durees.reduce((a,b)=>Math.abs(b-S.abf.duree)<Math.abs(a-S.abf.duree)?b:a);
    const selT=S.abf.taux;
    let tbl=`<div style="overflow-x:auto"><table class="vie-table">
      <thead><tr><th>Durée \ Taux</th>${taux.map(t=>`<th style="color:${t===selT?"var(--gold)":"inherit"};font-weight:${t===selT?700:500}">${t}%${t===selT?" ◀":""}</th>`).join("")}</tr></thead>

    tableCard.innerHTML+=tbl;

// STEP 4 — PROFIL RISQUE
// ═══════════════════════════════════════════════════════════
function renderStep4(){
  const c=$("step-4"); c.innerHTML="";
  const nb=Object.keys(S.riskAns).length;

  const card=document.createElement("div"); card.className="card";
  card.appendChild(makeSecHead("Questionnaire — Profil de risque de l'investisseur",`12 questions pondérées · ${nb}/12 répondues`,"sec-head-bar-muted"));
  const prog=document.createElement("div"); prog.className="risk-progress";
  const bar=document.createElement("div"); bar.className="risk-bar"; bar.style.width=(nb/12*100)+"%";
  prog.appendChild(bar); card.appendChild(prog);

  RISK_QUESTIONS.forEach((q,qi)=>{
    const qCard=document.createElement("div"); qCard.className="risk-card"+(S.riskAns[q.id]!==undefined?" answered":"");
    const qHead=document.createElement("div"); qHead.style.cssText="display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap";
    qHead.innerHTML=`<span style="font-size:10px;font-weight:700;background:var(--gold-bg2);color:#7A5A1A;padding:2px 8px;border-radius:7px">${qi+1}/12</span><span style="font-size:10px;background:var(--bg);color:var(--muted);padding:2px 8px;border-radius:7px">${q.category} · ${q.weight}pts</span>`;
    qCard.appendChild(qHead);
    const qText=document.createElement("div"); qText.style.cssText="font-size:13px;font-weight:600;color:var(--dark);margin-bottom:10px"; qText.textContent=q.question;
    qCard.appendChild(qText);
    q.options.forEach(opt=>{
      const b=document.createElement("button"); b.className="risk-opt"+(S.riskAns[q.id]===opt.score?" sel":"");
      b.innerHTML=`<div class="risk-radio"></div><span>${opt.label}</span>`;
      b.onclick=()=>{S.riskAns[q.id]=opt.score;renderStep4();};
      qCard.appendChild(b);
    });
    card.appendChild(qCard);
  });

  const calcBtn=document.createElement("button"); calcBtn.className="btn btn-gold"; calcBtn.style.cssText="background:var(--gold-d);margin-top:10px;opacity:"+(nb<12?".45":"1");
  calcBtn.textContent="Calculer mon profil de risque →"; calcBtn.disabled=nb<12;
  if(nb<12){const hint=document.createElement("span");hint.style.cssText="font-size:12px;color:var(--muted)";hint.textContent=` ${12-nb} question(s) restante(s)`;calcBtn.after?calcBtn.after(hint):null;}
  calcBtn.onclick=()=>{
    const tw=RISK_QUESTIONS.reduce((a,q)=>a+q.weight,0);
    let ws=0; RISK_QUESTIONS.forEach(q=>{if(S.riskAns[q.id]!==undefined)ws+=S.riskAns[q.id]*q.weight;});
    const score=Math.round((ws/(5*tw))*100);
    const level=RISK_LEVELS.find(l=>score>=l.min&&score<=l.max)||RISK_LEVELS[0];
    S.riskResult={score,level};
    renderStep4();
  };
  const btnRow=document.createElement("div"); btnRow.style.cssText="display:flex;align-items:center;gap:12px;margin-top:12px";
  btnRow.appendChild(calcBtn);
  if(nb<12){const hint=document.createElement("span");hint.style.cssText="font-size:12px;color:var(--muted)";hint.textContent=`${12-nb} question(s) restante(s)`;btnRow.appendChild(hint);}
  card.appendChild(btnRow);

  if(S.riskResult){
    const rl=S.riskResult.level;
    const res=document.createElement("div"); res.style.cssText=`margin-top:16px;padding:16px 20px;border-radius:10px;background:${rl.bg};border:2px solid ${rl.color};display:flex;align-items:center;gap:16px`;
    res.innerHTML=`<div style="font-size:40px;font-weight:800;color:${rl.color}">${S.riskResult.score}</div><div><div style="font-size:18px;font-weight:700">${rl.label}</div><div style="font-size:12px;color:var(--muted);margin-top:3px">${rl.desc}</div><div style="margin-top:6px"><div class="pbar" style="width:200px"><div class="pbar-fill" style="width:${S.riskResult.score}%;background:${rl.color}"></div></div></div></div>`;
    card.appendChild(res);
  }
  c.appendChild(card);
  c.appendChild(navRow(true,true));
}

// STEP 6 — RECOMMANDATIONS
// ═══════════════════════════════════════════════════════════
function computeRecs(){
  const age=S.vous.dateNaissance?new Date().getFullYear()-new Date(S.vous.dateNaissance).getFullYear():35;
  const rev=(S.vous.revenuEmploi||0)+(S.vous.autresRevenus||0);
  const totP=Object.values(S.passif).reduce((a,b)=>a+b,0);
  const totA=Object.values(S.actif).reduce((a,b)=>a+b,0);
  const totalVieEx=S.protVie.reduce((s,p)=>s+(p.capital||0),0);
  const totalMGEx=S.protMG.capitalAssure||0;
  const totalInvEx=S.protInv.revenuMensuel||0;
  const hasEnf=S.vous.aEnfants!==false&&S.enfants.some(e=>e.prenom);

  const scored=Object.entries(products).map(([name,prod])=>{
    let s=0; const reasons=[];
    prod.recommended_for.forEach(n=>{if(S.besoins.includes(n)){s+=30;}});
    if(name==="Vie temporaire"){
      if(totP>50000){s+=20;reasons.push("Dettes importantes à couvrir");}
      if(hasEnf){s+=15;reasons.push("Protection famille avec enfants");}
      if(age<45){s+=10;reasons.push("Prime abordable à cet âge");}
      if(totalVieEx>0){const cp=Math.min(100,(totalVieEx/Math.max(totP,1))*100);if(cp>=80){s-=35;reasons.push("Couverture vie existante suffisante");}else if(cp>=40){s-=15;reasons.push("Couverture partielle existante");}}
    }
    if(name==="Vie participante"){if(totA>300000){s+=20;reasons.push("Succession patrimoine élevé");}}
    if(name==="Vie universelle"){if(totA>200000){s+=15;reasons.push("Stratégie patrimoine avancée");}}
    if(name==="Maladies graves"){
      if(age>30&&age<60){s+=15;reasons.push("Statistiquement critique 30-60 ans");}
      s+=10;reasons.push("1 Canadien sur 2 recevra un diagnostic MG");
      if(totalMGEx>0){const cible=Math.max(rev*0.5,50000);const cp=Math.min(100,(totalMGEx/cible)*100);if(cp>=80){s-=35;reasons.push("Couverture MG existante suffisante");}else if(cp>=40){s-=15;reasons.push("Couverture MG partielle existante");}}
    }
    if(name==="Invalidité"){
      s+=15;reasons.push("Risque 3× plus élevé que le décès");
      if(totalInvEx>0){s-=20;reasons.push(`Invalidité existante : ${fmt(totalInvEx)}/mois`);}
      if(rev>60000){s+=10;reasons.push("Revenu élevé à protéger");}
    }
    if(name==="Soins de longue durée"){if(age>50){s+=20;reasons.push("Planification longue durée pertinente");}}
    if(name==="Assurance collective"){if(S.besoins.includes("employeur")||S.besoins.includes("entrepreneur")){s+=25;reasons.push("Outil de rétention pour employés");}}

    const coList=Object.entries(prod.companies).sort((a,b)=>({star:0,check:1,case:2}[a[1].label||"check"]||1)-({star:0,check:1,case:2}[b[1].label||"check"]||1)).slice(0,3).map(([n,info])=>({name:n,label:info.label||"check",note:info.note||""}));
    return{name,icon:prod.icon,color:prod.color,score:Math.max(0,s),reasons,companies:coList,strengths:prod.strengths,questions:prod.questions,description:prod.description};
  }).filter(r=>r.score>0).sort((a,b)=>b.score-a.score);
  // ── Logique profil médical ──
  const medProfil = S.med ? (S.med.profil || "inconnu") : "inconnu";
  const medProfilC = S.medC ? (S.medC.profil || "inconnu") : "inconnu";
  const isNoExam = (S.med && S.med.preferenceNoExam) || (S.medC && S.medC.preferenceNoExam);
  const isSousStd = medProfil === "sous-standard" || medProfilC === "sous-standard";
  const isNonAss = medProfil === "non-assurable" || medProfilC === "non-assurable";
  const NO_EXAM_SPECIALISTS = ["Assomption Vie","Humania","Plan de Protection du Canada","HUGO","iA Groupe Financier","Manuvie"];

  const finalRecs = scored.map(r => {
    const prod = products[r.name];
    if (!prod) return r;
    if (isNonAss) {
      return { ...r, medAlert: "⚠️ Profil difficile — acceptation garantie seulement. Vérifier avec l'assureur.", medAlertType: "error" };
    }
    if (isNoExam || isSousStd) {
      const available = NO_EXAM_SPECIALISTS.filter(co => prod.companies && prod.companies[co]);
      if (available.length > 0) {
        return { ...r, medAlert: "💊 No-exam disponible : " + available.slice(0,3).join(", "), medAlertType: "info" };
      } else if (isSousStd) {
        return { ...r, medAlert: "🔶 Sous-standard : tarification majorée probable", medAlertType: "warning" };
      }
    }
    return r;
  });

  S.recs = finalRecs; return finalRecs;
}

}

        });

        row.querySelectorAll('button')[1].addEventListener('click', (e)=>{

function eStepperEl() {
  const wrap=document.createElement('div'); wrap.style.cssText='display:flex;align-items:center;gap:0;margin-bottom:18px;background:white;border-radius:10px;padding:10px 14px;border:1px solid var(--border);overflow-x:auto';

  backBtn.innerHTML='← Menu'; backBtn.onclick=()=>showLanding(); wrap.appendChild(backBtn);
  const badge=document.createElement('span'); badge.style.cssText='font-size:9px;background:var(--gold);color:white;border-radius:8px;padding:2px 8px;font-weight:700;margin-right:12px;flex-shrink:0';
  badge.textContent='⚡ Express'; wrap.appendChild(badge);
  ESTEPS.forEach((s,i)=>{
    if(i>0){const sep=document.createElement('div');sep.style.cssText='width:24px;height:2px;background:var(--border);flex-shrink:0';wrap.appendChild(sep);}
    const d=document.createElement('div'); d.style.cssText='display:flex;align-items:center;gap:5px;flex-shrink:0;cursor:'+(i<=expressStep?'pointer':'default');
    d.innerHTML=`<div style="width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;background:${i<expressStep?'var(--gold)':i===expressStep?'var(--dark)':'var(--bg2)'};color:${i<expressStep?'white':i===expressStep?'white':'var(--muted)'}">${i<expressStep?'✓':i+1}</div><span style="font-size:11px;font-weight:${i===expressStep?700:400};color:${i===expressStep?'var(--dark)':'var(--muted)'}">${s}</span>`;
    if(i<expressStep) d.onclick=()=>showExpressStep(i);
    wrap.appendChild(d);
  });
  return wrap;
}

function eNavEl(hasPrev, hasNext, nextFn, prevFn) {
  const row=document.createElement('div'); row.style.cssText='display:flex;justify-content:space-between;align-items:center;margin-top:16px;gap:10px';
  const left=document.createElement('div');
  if(hasPrev){const b=document.createElement('button');b.className='btn';b.innerHTML='← Retour';b.onclick=prevFn||null;left.appendChild(b);}
  row.appendChild(left);
  if(hasNext){const b=document.createElement('button');b.className='btn btn-gold';b.style.fontSize='13px';b.innerHTML=expressStep>=2?'Voir le résumé ✓':'Continuer →';b.onclick=nextFn||null;row.appendChild(b);}
  return row;
}

// ── Fonctions de calcul ──────────────────────────────────────────────
function getPrime(produitKey, age, fumeur, capital, sexe, pctInv) {
  const table = PRIME_TABLES[produitKey];
  if (!table) return null;
  const ages = Object.keys(table).map(Number).sort((a,b)=>a-b);
  let ageRef = ages[0];
  for (const a of ages) { if (a <= age) ageRef = a; }
  const [nf, f] = table[ageRef];
  const base = fumeur ? f : nf;
  // Facteur sexe : femmes ~15% moins cher vie temporaire, ~20% moins cher invalidité
  const sexeFactor = (sexe||'M')==='F' ? (produitKey.includes('nvalidit')? 0.80 : 0.88) : 1.0;
  // Facteur % remplacement revenu pour invalidité
  const pctFactor = produitKey.includes('nvalidit') ? ((pctInv||60)/60) : 1.0;
  // Ajuster selon capital demandé vs capital de référence
  const refCapital = produitKey.includes('500k') ? 500000 : produitKey.includes('250k') ? 250000 : produitKey.includes('100k') ? 100000 : 250000;
  return Math.round(base * (capital / refCapital) * sexeFactor * pctFactor);
}

function getAgeRef(dateNaissance) {
  if (!dateNaissance) return 35;
  return Math.max(20, Math.min(55, new Date().getFullYear() - new Date(dateNaissance).getFullYear()));
}

    avSection.innerHTML = `

      card.innerHTML = `
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px">
          <div style="font-size:12px;font-weight:700;color:var(--dark)">${av.nom}</div>
          <span style="font-size:10px;background:var(--gold-bg);color:var(--gold-d);border-radius:6px;padding:1px 7px;font-weight:700;white-space:nowrap;margin-left:8px">${av.impact}</span>

        <div style="font-size:11px;color:var(--muted);margin-bottom:8px">${av.desc}</div>

  // ── FICHE CLIENT IMPRIMABLE ──────────────────────────────────────
  const ficheSection = document.createElement('div');
  ficheSection.style.cssText = 'background:white;border-radius:12px;border:1.5px solid var(--gold);overflow:hidden;box-shadow:0 2px 12px rgba(200,169,81,.15)';

  ficheSection.innerHTML = `
    <div style="background:linear-gradient(135deg,var(--dark),#1a1a2e);padding:16px 20px;display:flex;align-items:center;justify-content:space-between">
      <div>
        <div style="font-size:9px;color:var(--gold);letter-spacing:.15em;font-weight:700;text-transform:uppercase">Elevate Capital · Fiche client</div>
        <div style="font-size:16px;font-weight:800;color:white;margin-top:2px">${prodNom}${type==='vie-terme'?' — T'+duree:''}</div>
      </div>

        <div style="font-size:10px;color:rgba(255,255,255,.5)">${new Date().toLocaleDateString("fr-CA")}</div>
        <div style="font-size:11px;color:var(--gold);font-weight:700">${age} ans · ${fumeur?'Fumeur':'Non-fumeur'}</div>
      </div>

  const ficheBody = document.createElement('div');
  ficheBody.style.cssText = 'padding:18px 20px';

  // Comparaison top 3 côte-à-côte format fiche
  ficheBody.innerHTML = `<div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px">Les 3 meilleures options pour votre situation</div>`;

  const ficheGrid = document.createElement('div');
  ficheGrid.style.cssText = 'display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px';

  compData.slice(0,3).forEach((co, i) => {
    const fc = document.createElement('div');
    fc.style.cssText = `padding:12px;border-radius:9px;border:1.5px solid ${i===0?'var(--gold)':'var(--border)'};background:${i===0?'var(--gold-bg)':'white'}`;
    fc.innerHTML = `
      <div style="font-size:10px;color:${i===0?'var(--gold-d)':'var(--muted)'};font-weight:700;text-transform:uppercase;margin-bottom:5px">Option ${i+1} ${i===0?'— RECOMMANDÉE':''}</div>
      <div style="font-size:14px;font-weight:800;color:var(--dark);margin-bottom:4px">${co.nom}</div>
      ${co.prime?`<div style="font-size:18px;font-weight:800;color:${i===0?'var(--gold-d)':'var(--dark)'};">${co.prime}<span style="font-size:10px;font-weight:400;color:var(--muted)">/mois*</span></div>`:''}
      <div style="margin-top:8px;display:flex;flex-direction:column;gap:3px">
        ${(co.forces||[]).slice(0,2).map(f=>`<div style="font-size:10px;color:var(--text);display:flex;gap:4px"><span style="color:${i===0?'var(--gold)':'var(--muted)'};flex-shrink:0">✓</span>${f}</div>`).join('')}
      </div>`;
    ficheGrid.appendChild(fc);

  ficheBody.appendChild(ficheGrid);

  // Note importante + CTA
  ficheBody.innerHTML += `
    <div style="font-size:10px;color:var(--muted);padding:8px 12px;background:var(--bg2);border-radius:7px;margin-bottom:12px">
      * Primes estimées à titre indicatif. Des illustrations officielles vous seront remises lors de notre prochaine rencontre.
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between;padding-top:10px;border-top:1px solid var(--border)">
      <div style="font-size:11px;color:var(--text)">
        <span style="font-weight:700">Vincent Froment</span> · <a href="mailto:vincent@elevate-capital.com" style="color:var(--gold)">vincent@elevate-capital.com</a>
      </div>
      <a href="https://elevate-capital.com/rencontre" target="_blank" style="font-size:10px;background:var(--gold);color:white;padding:5px 12px;border-radius:7px;text-decoration:none;font-weight:700">Prendre rendez-vous →</a>

  // Bouton retour landing

// ── Démarrer le comparateur ──────────────────────────────────────────
function startComparateur() {
  try {
    appMode = 'comparateur';
    $("landing").style.display = 'none';
    ['e0','e1','e2','e3'].forEach(s=>{const d=$("step-"+s);if(d)d.style.display='none';});
    for(let i=0;i<8;i++){const d=$("step-"+i);if(d)d.style.display='none';}
    document.querySelector('.stepper.no-print').style.display='none';
    const cc=$("comp-container");
    if(!cc){ console.error("comp-container introuvable!"); return; }
    cc.style.display='block';
    renderComparateur();
  } catch(e) {
    console.error("Erreur startComparateur:", e);
    alert("Erreur comparateur: " + e.message);
  }
}
window.startComparateur = startComparateur;

  try{ renderStepper(); }catch(e){console.error("STEPPER:",e);}
  try{ renderStep0(); }catch(e){console.error("STEP0:",e);}
  try{ renderStep1(); }catch(e){console.error("STEP1:",e);}
  try{ renderStep2(); }catch(e){console.error("STEP2:",e);}
  try{ renderStep3(); }catch(e){console.error("STEP3:",e);}
  try{ renderStep4(); }catch(e){console.error("STEP4:",e);}
  try{ renderStep5(); }catch(e){console.error("STEP5:",e);}
  try{ renderStep6(); }catch(e){console.error("STEP6:",e);}

  showStep(currentStep); updateHdr();
}
// ── AUTO-SAVE ──────────────────────────────────────────
function autoSaveDossier() {
  try {
    localStorage.setItem('ec_dossier_autosave', JSON.stringify(S));
    const now = new Date();
    const timeStr = now.toLocaleTimeString('fr-CA', {hour:'2-digit',minute:'2-digit'});
    const el = document.getElementById('hdr-autosave');
    if(el) { el.textContent = '💾 ' + timeStr; el.style.color = 'var(--green)'; }
    // Sauvegarder dans historique multi-dossiers
    if(S.vous.nom || S.vous.prenom) {
      const hist = JSON.parse(localStorage.getItem('ec_dossier_history')||'[]');
      const entry = {
        id: S._dossierId || (S._dossierId = Date.now()),
        nom: (S.vous.prenom||'') + ' ' + (S.vous.nom||''),
        date: S.dateRencontre || now.toLocaleDateString('fr-CA'),
        heure: timeStr,
        snapshot: JSON.stringify(S)
      };
      const idx = hist.findIndex(h=>h.id===entry.id);
      if(idx>=0) hist[idx]=entry; else hist.unshift(entry);
      localStorage.setItem('ec_dossier_history', JSON.stringify(hist.slice(0,10)));
    }
  } catch(e) { console.error('Auto-save error:', e); }
}

function loadAutoSave() {
  try {
    const saved = localStorage.getItem('ec_dossier_autosave');
    if(saved) { const d=JSON.parse(saved); if(d.vous) return d; }
  } catch(e) {}
  return null;
}

// Lancer l'auto-save toutes les 30 secondes
setInterval(autoSaveDossier, 30000);

// ── CHRONOMÈTRE ────────────────────────────────────────
let _timerStart = null;
let _timerInterval = null;
let _timerRunning = false;

function startTimer() {
  if(_timerRunning) { stopTimer(); return; }
  _timerStart = _timerStart || Date.now();
  _timerRunning = true;
  _timerInterval = setInterval(updateTimer, 1000);
  updateTimer();
  const btn = document.getElementById('timer-btn');
  if(btn) { btn.textContent = '⏸'; btn.title = 'Pause'; }
}

function stopTimer() {
  _timerRunning = false;
  clearInterval(_timerInterval);
  const btn = document.getElementById('timer-btn');
  if(btn) { btn.textContent = '▶'; btn.title = 'Reprendre'; }
}

function resetTimer() {
  stopTimer();
  _timerStart = null;
  const el = document.getElementById('hdr-timer');
  if(el) el.textContent = '00:00';
  const btn = document.getElementById('timer-btn');
  if(btn) { btn.textContent = '▶'; btn.title = 'Démarrer'; }
}

function updateTimer() {
  if(!_timerStart) return;
  const elapsed = Math.floor((Date.now() - _timerStart) / 1000);
  const min = Math.floor(elapsed/60).toString().padStart(2,'0');
  const sec = (elapsed%60).toString().padStart(2,'0');
  const el = document.getElementById('hdr-timer');
  if(el) {
    el.textContent = min+':'+sec;
    el.style.color = elapsed > 1200 ? 'var(--red)' : elapsed > 600 ? '#f59e0b' : 'var(--gold)';
  }
}

showLanding();
